<!DOCTYPE html>
<html>
<head>
    <title>Sentinel AI</title>
   
    <style>

body{
    font-family: Arial, sans-serif;
    background-color: #f4f6f9;
    max-width: 1000px;
    margin: 30px auto;
    padding: 20px;
}

h1{
    text-align:center;
}

.subtitle{
    text-align:center;
    color:gray;
    margin-bottom:30px;
}

.card{
    background:white;
    padding:20px;
    border-radius:15px;
    box-shadow:0px 2px 10px rgba(0,0,0,0.1);
}

textarea,input,select{
    width:100%;
    padding:10px;
    margin-top:5px;
    margin-bottom:15px;
}

button{
    padding:12px 20px;
    border:none;
    border-radius:8px;
    cursor:pointer;
}

button[type="submit"]{
    background:#0078D4;
    color:white;
}

pre{
    background:#eef2f7;
    padding:20px;
    border-radius:10px;
    white-space:pre-wrap;
}

</style>

</head>

<body>

    <h1>🚀 Sentinel AI - Future Self Agent</h1>
     <p class="subtitle">
    Discover skill gaps, generate roadmaps, and explore future career paths.
    </p>
    <div class="card"></div>
    <form method="POST">

        <label>Current Skills</label>
        <textarea name="skills" rows="5"></textarea>

        <label>Future Goal</label>
        <select name="goal">
        <option>Cybersecurity Analyst</option>
        <option>AI Engineer</option>
        <option>Cloud Engineer</option>
        <option>Software Developer</option>
        </select>

        <label>Hours Available Per Week</label>
        <input type="number" name="hours">

        <button type="submit">
            Generate Future Plan
        </button>
        <button type="button" onclick="window.location.href='/'">
                Reset
        </button>

    </div>

    <hr>

    <pre>{{ result }}</pre>

</body>
</html>
